name: Unit Test On Linux

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  unit-test:
    strategy:
      matrix:
        arch:
          - x86_64
          - arm64

    runs-on: ${{ 'x86_64' == matrix.arch && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup XMake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Configure XMake
      working-directory: ${{github.workspace}}
      run: xmake f -m release --with_gtest=true -y

    - name: Build Targets
      working-directory: ${{github.workspace}}
      run: xmake build

    - name: Run Unit Test
      working-directory: ${{github.workspace}}
      run: xmake test
