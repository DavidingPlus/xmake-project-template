name: Update xmake-repo

on:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      version:
        description: "Release tag"
        required: true
        default: "v1.2.0"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
    - name: Notify xmake-repo
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.XMAKE_REPO_TOKEN }}
        repository: davidingplus/xmake-repo
        event-type: update-package
        client-payload: |
          {
            "package": "xmake-project",
            "repo": "${{ github.repository }}",
            "version": "${{ github.event.release.tag_name || inputs.version }}"
          }
