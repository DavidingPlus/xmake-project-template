# Template: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Build On Linux

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        arch:
          - x86_64
          - arm64

    runs-on: ${{ 'x86_64' == matrix.arch && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup XMake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Configure XMake
      working-directory: ${{github.workspace}}
      run: xmake f -m release

    - name: Build Targets
      working-directory: ${{github.workspace}}
      run: xmake build

    - name: Install Targets
      working-directory: ${{github.workspace}}
      run: xmake install

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: install-${{ matrix.arch }}
        path: build/linux/${{ matrix.arch }}/release/install
        include-hidden-files: true
        if-no-files-found: error
