# Release On Multiple Platform
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows
            arch: x86_64
            xmake-plat: windows
            xmake-arch: x64
            runs-on: windows-latest

          - os: ubuntu
            arch: x86_64
            xmake-plat: linux
            xmake-arch: x86_64
            runs-on: ubuntu-latest

          - os: ubuntu
            arch: arm64
            xmake-plat: linux
            xmake-arch: arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup XMake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Configure XMake
      run: xmake f -m release -p ${{ matrix.xmake-plat }} -a ${{ matrix.xmake-arch }}

    - name: Build Targets
      working-directory: ${{github.workspace}}
      run: xmake build

    - name: Generate Packages
      working-directory: ${{github.workspace}}
      run: xmake package

    - name: Upload Package Repository
      uses: actions/upload-artifact@v4
      with:
        name: package-${{ matrix.os }}-${{ matrix.arch }}
        path: build/packages/
        include-hidden-files: true
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Download Package Repository
      uses: actions/download-artifact@v4
      with:
        path: packages/
        merge-multiple: true

    - name: Display Package Repository
      run: tree packages

    # - name: Archive Package Repository
