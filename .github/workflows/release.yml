# Release On Multiple Platform
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows
            arch: x86_64
            plat: windows
            xmake-arch: x64
            runs-on: windows-latest

          - os: ubuntu
            arch: x86_64
            plat: linux
            xmake-arch: x86_64
            runs-on: ubuntu-latest

          - os: ubuntu
            arch: arm64
            plat: linux
            xmake-arch: arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup XMake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Configure XMake
      run: xmake f -m release -p ${{ matrix.plat }} -a ${{ matrix.xmake-arch }}

    - name: Build Targets
      working-directory: ${{github.workspace}}
      run: xmake build

    # 使用 xmake 原生 package 机制生成二进制包。xmake package 生成的不是源码包，而是已经编译完成的二进制包。
    # 示例：
    #
    # build/packages/
    # └── x
    #     └── xmake-project
    #         └── linux
    #             └── x86_64
    #                 └── release
    #                     ├── include/
    #                     ├── lib/
    #                     └── bin/
    #
    # 该结构适合：
    #   1. xmake 包管理系统直接使用。
    #   2. 作为 xmake-repo 二进制包仓库的数据源。
    #   3. 同时管理多个平台、架构的预编译包。
    - name: Generate Packages
      working-directory: ${{github.workspace}}
      run: xmake package

    # 上传 xmake package 原始二进制包。这里保存的是 xmake 管理格式的二进制包集合。
    # 不同 matrix 任务产生的内容最终可以合并为：
    #
    # packages/
    # └── x
    #     └── xmake-project
    #         ├── linux/x86_64/release
    #         ├── linux/arm64/release
    #         └── windows/x64/release
    #
    # xmake 可以根据当前环境自动选择匹配的平台和架构。
    - name: Upload XMake Package Directory
      uses: actions/upload-artifact@v4
      with:
        name: xmake-packages-${{ matrix.plat }}-${{ matrix.xmake-arch }}
        path: build/packages/
        if-no-files-found: error

    # 将 xmake package 二进制包转换为独立发布包。这里并不是重新编译，也不是生成另一种类型的包。它只是将 xmake package 中指定平台和架构的二进制内容提取出来，去除 xmake 的目录管理层。
    #
    # 原始结构：
    #
    # xmake-project/
    # └── linux/
    #     └── x86_64/
    #         └── release/
    #             ├── include/
    #             ├── lib/
    #             └── bin/
    #
    # 转换后：
    #
    # xmake-project-linux-x86_64.tar.gz
    # ├── include/
    # ├── lib/
    # └── bin/
    #
    # 两者都是二进制包：
    #   1. xmake package: 面向 xmake 包管理，保留平台/架构信息。
    #   2. platform package: 面向 GitHub Release 和普通用户下载，结构更加简单。
    - name: Archive Platform Package
      shell: bash
      run: |
        tar czf \
        xmake-project-${{ github.ref_name }}-${{ matrix.plat }}-${{ matrix.xmake-arch }}.tar.gz \
        -C build/packages/x/xmake-project/${{ matrix.plat }}/${{ matrix.xmake-arch }}/release .

    - name: Upload Platform Package
      uses: actions/upload-artifact@v4
      with:
        name: platform-package-${{ matrix.plat }}-${{ matrix.xmake-arch }}
        path: "*.tar.gz"
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Download All Packages
      uses: actions/download-artifact@v4
      with:
        path: assets
        merge-multiple: true

    - name: Archive XMake Package
      shell: bash
      run: |
        tar czf \
        xmake-project-${{ github.ref_name }}.tar.gz \
        -C assets x

    - name: Display Release Assets
      run: tree assets -a

    # - name: Create Release
    #   uses: softprops/action-gh-release@v2
    #   with:
    #     files: assets/*.tar.gz
