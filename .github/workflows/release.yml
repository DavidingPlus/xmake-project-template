# Release On Multiple Platform
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows
            arch: x86_64
            plat: windows
            xmake-arch: x64
            runs-on: windows-latest

          - os: ubuntu
            arch: x86_64
            plat: linux
            xmake-arch: x86_64
            runs-on: ubuntu-latest

          - os: ubuntu
            arch: arm64
            plat: linux
            xmake-arch: arm64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup XMake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Configure XMake
      run: xmake f -m release -p ${{ matrix.plat }} -a ${{ matrix.xmake-arch }}

    - name: Build Targets
      working-directory: ${{github.workspace}}
      run: xmake build

    - name: Generate Packages
      working-directory: ${{github.workspace}}
      run: xmake package

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install eza
      run: |
        cargo install eza
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Display Generated Packages
      working-directory: ${{github.workspace}}
      run: eza --tree --all build/packages/

    # 将 xmake package 生成的目录转换为独立二进制包。
    - name: Archive Packages
      shell: bash
      run: |
        tar czf \
        xmake-project-${{ github.ref_name }}-${{ matrix.plat }}-${{ matrix.xmake-arch }}.tar.gz \
        -C build/packages/x/xmake-project/${{ matrix.plat }}/${{ matrix.xmake-arch }}/release .

    - name: Display Archived Packages
      shell: bash
      run: |
        tar tf \
        xmake-project-${{ github.ref_name }}-${{ matrix.plat }}-${{ matrix.xmake-arch }}.tar.gz

    - name: Upload Package Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: package-${{ matrix.plat }}-${{ matrix.xmake-arch }}
        path: "*.tar.gz"
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Download Packages
      uses: actions/download-artifact@v4
      with:
        path: assets
        merge-multiple: true

    - name: Display Release Assets
      run: tree assets

    # - name: Create Release
    #   uses: softprops/action-gh-release@v2
    #   with:
    #     files: assets/*.tar.gz
